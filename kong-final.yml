_format_version: "1.1"

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-route
        paths:
          - /auth/v1
        strip_path: true
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-route
        paths:
          - /rest/v1
        strip_path: true
  - name: realtime-v1
    url: http://realtime:4000/
    routes:
      - name: realtime-v1-route
        paths:
          - /realtime/v1
        strip_path: true
  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-route
        paths:
          - /storage/v1
        strip_path: true
  - name: functions-v1
    url: http://functions:9000/
    routes:
      - name: functions-v1-route
        paths:
          - /functions/v1
        strip_path: true
  - name: mcp
    url: http://supabase-mcp:8080/mcp
    routes:
      - name: mcp-route
        paths:
          - /mcp
        strip_path: true

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - Authorization
        - apikey
        - X-Client-Info
      exposed_headers:
        - Content-Range
        - X-Total-Count
      max_age: 3600
  - name: key-auth
    config:
      key_names:
        - apikey
    route: auth-v1-route
  - name: key-auth
    config:
      key_names:
        - apikey
    route: rest-v1-route
  - name: key-auth
    config:
      key_names:
        - apikey
    route: realtime-v1-route
  - name: key-auth
    config:
      key_names:
        - apikey
    route: storage-v1-route
  - name: key-auth
    config:
      key_names:
        - apikey
    route: functions-v1-route
  # Auth whitelist for MCP
  - name: key-auth
    config:
      key_names:
        - apikey
    route: mcp-route
