services:
  nexus-crm:
    build: .
    ports:
      - "4000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:Seguro2026Sup%40base%21@172.19.0.3:5432/nexus_crm
      - NODE_ENV=production
      - PORT=3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexus-crm.rule=Host(`crm.dvadvoga.com.br`)"
      - "traefik.http.routers.nexus-crm.entrypoints=websecure"
      - "traefik.http.routers.nexus-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexus-crm.loadbalancer.server.port=3000"
    networks:
      - supa-v3_default
networks:
  supa-v3_default:
    external: true
