services:
  nexus-crm:
    build: .
    ports:
      - "4000:3000"
    environment:
      # DATABASE_URL desabilitado - operando em modo SANDBOX/SIMULADO
      # Para ativar Supabase real, descomente e atualize a linha abaixo:
      # - DATABASE_URL=postgresql://postgres:SENHA@HOST:5432/postgres
      - VITE_GEMINI_API_KEY=${VITE_GEMINI_API_KEY}
      - NODE_ENV=production
      - PORT=3000
      - ALLOW_SIMULATED_MODE=true
      # Evolution API
      - EVOLUTION_API_URL=https://whatsapp.dvadvoga.com.br
      - EVOLUTION_GLOBAL_API_KEY=nexu_evolution_stable_2026_key
      - BACKEND_URL=https://crm.dvadvoga.com.br
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nexus-crm.rule=Host(`crm.dvadvoga.com.br`)"
      - "traefik.http.routers.nexus-crm.entrypoints=websecure"
      - "traefik.http.routers.nexus-crm.tls.certresolver=letsencrypt"
      - "traefik.http.services.nexus-crm.loadbalancer.server.port=3000"
    networks:
      - dokploy-network
networks:
  dokploy-network:
    external: true
